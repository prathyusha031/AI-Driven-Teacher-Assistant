<!DOCTYPE html>
<html>
<head>
    <title>AI Teacher Assistant</title>
</head>
<body>

<h2>Upload PDF Notes</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Upload & Generate Summary
    </button>
</form>

<hr>

<h2>Uploaded Documents</h2>

{% for doc in documents %}

<h3>{{ doc.title }}</h3>

<p>
{{ doc.summary }}
</p>

<hr>

{% endfor %}

</body>
</html>
