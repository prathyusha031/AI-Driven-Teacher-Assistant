{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

    <h2>Quiz History</h2>

    <table class="table table-bordered">

        <thead>

            <tr>
                <th>Document</th>
                <th>Score</th>
                <th>Percentage</th>
                <th>Date</th>
            </tr>

        </thead>

        <tbody>

            {% for result in results %}

            <tr>

                <td>{{ result.document.title }}</td>

                <td>{{ result.score }}</td>

                <td>{{ result.percentage }}%</td>

                <td>{{ result.attempted_at }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
