{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h2>{{ total_documents }}</h2>
            <p>Documents</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h2>{{ total_summaries }}</h2>
            <p>Summaries</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h2>{{ total_quizzes }}</h2>
            <p>Quizzes</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 text-center">
            <h2>{{ average_score }}</h2>
            <p>Average Score</p>
        </div>
    </div>

</div>

{% endblock %}
